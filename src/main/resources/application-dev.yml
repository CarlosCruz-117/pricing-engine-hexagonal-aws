spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true   # Muestra sentencias SQL en consola
    hibernate:
      ddl-auto: create-drop  # Crea las tablas al arrancar (basándose en las @Entity)
  sql:
    init:
      mode: always   # Fuerza procesamiento de data.sql

logging:
  level:
    root: INFO
    com.pricing: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE  # Muestra los parámetros de las queries
