spring:
  h2:
    console:
      enabled: false
  datasource:
    # Sustituir por PostgreSQL/MySQL en producción real
    # url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    # driverClassName: org.postgresql.Driver
    url: ${DB_URL:jdbc:h2:mem:pricingdb_pro}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:""}
  jpa:
    # database-platform: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    hibernate:
      ddl-auto: validate  # Solo validar esquema correcto
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.pricing: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
