server:
  port: 8080

spring:
  application:
    name: pricing-engine
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true # Ver en la consola senteencias SQL
    defer-datasource-initialization: true # Espera a crear las tablas antes de cargar el SQL
    hibernate:
      ddl-auto: create-drop # Crea las tablas al arrancar (basándose en las @Entity)
  sql:
    init:
      mode: always